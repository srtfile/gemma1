name: Run Stream Resolver

on:
  workflow_dispatch:
    inputs:
      imdb_id:
        description: 'IMDB ID (e.g. tt0800369)'
        required: false
        default: 'tt0800369'

jobs:
  resolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run stream resolver
        run: python get_streams.py "${{ github.event.inputs.imdb_id }}"

      - name: Commit result.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/result.json
          git commit -m "Update result for ${{ github.event.inputs.imdb_id }}" || echo "No changes"
          git push